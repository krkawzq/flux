# ============================================================================
# Basic Settings
# ============================================================================
unbind C-b
set -g prefix C-a
# 快捷键：按 Prefix (Ctrl+a) 后，再按一次 Ctrl+a 发送原生 Ctrl+a
bind C-a send-prefix
# 新增快捷键：按 Prefix (Ctrl+a) 后，按小写 a 也可以发送原生 Ctrl+a (更方便连按)
bind a send-prefix

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
setw -g mode-keys vi

# 设置默认使用 zsh
set-option -g default-shell /bin/zsh

# ============================================================================
# Display Settings (SSH-friendly)
# ============================================================================
# 更好的终端兼容性
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -ga terminal-overrides ',*:Ss=\E[%p1%d q:Se=\E[ q'  # cursor shape

set -g mouse on
set -g history-limit 50000
set -sg escape-time 10      # 稍微增加一点，SSH 延迟时更稳定
set -g focus-events on

# ============================================================================
# Window & Pane Management
# ============================================================================
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded!"
bind c new-window -c '#{pane_current_path}'

# Split windows
bind | split-window -h -c '#{pane_current_path}'
bind _ split-window -v -c '#{pane_current_path}'
bind '\' split-window -h -p 25
bind - split-window -v -p 25

# Resize panes
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Switch windows
bind -n S-Left  previous-window
bind -n S-Right next-window

# ============================================================================
# Popup Terminal (Ctrl+s)
# ============================================================================
# 修复嵌套 Bug：使用 env TMUX= 清空环境变量，让 popup 认为它是一个全新的终端
bind -n C-s display-popup -E -w 80% -h 80% "env TMUX= tmux new-session -A -s popup"

# ============================================================================
# Copy Mode (Vi-style) - SSH 兼容方案 (修复 VSCode 复制问题)
# ============================================================================
unbind-key -T copy-mode-vi v
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi 'C-v' send-keys -X rectangle-toggle

# 修复说明：
# 之前的 `copy-pipe-and-cancel` 缺少管道命令参数，在 VSCode 中容易导致 OSC 52 转发失败。
# 换成 `copy-selection-and-cancel` 可以直接利用 tmux 内置的 OSC 52 机制，VSCode 兼容性更好。
set -s set-clipboard on
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection-and-cancel

# ============================================================================
# Vim-Tmux Navigation
# ============================================================================
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"

bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'
bind-key -n 'C-\' if-shell "$is_vim" 'send-keys C-\\' 'select-pane -l'

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l

# ============================================================================
# Status Bar
# ============================================================================
set-option -g status-justify left
set-option -g status-bg colour237
set-option -g status-interval 60

set-option -g status-left '#[bg=colour72] #[bg=colour237] #[bg=colour236] #[bg=colour235]#[fg=colour185] #S #[bg=colour236] '
set-option -g status-left-length 16

set-option -g status-right '#[bg=colour236] #[bg=colour235]#[fg=colour185] %a %d %b  #[bg=colour236]#[fg=colour3] #[bg=colour237] #[bg=colour72] #[]'

set-option -g pane-active-border-style fg=colour246
set-option -g pane-border-style fg=colour238

set-window-option -g window-status-format '#[bg=colour238]#[fg=colour107] #I #[bg=colour239]#[fg=colour110] #[bg=colour240]#W#[bg=colour239]#[fg=colour195]#F#[bg=colour238] '
set-window-option -g window-status-current-format '#[bg=colour236]#[fg=colour215] #I #[bg=colour235]#[fg=colour167] #[bg=colour234]#W#[bg=colour235]#[fg=colour195]#F#[bg=colour236] '


set -g set-clipboard on
# or more explicitly:
set -s copy-command ''
set -g allow-passthrough on

unbind -n MouseDown3Pane
unbind -n MouseDown3Status
unbind -n MouseDown3StatusLeft
unbind -n MouseDown3StatusRight
