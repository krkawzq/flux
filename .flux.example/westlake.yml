# Westlake server config
#
# Phase 4 schema features used:
#   version: 2          — explicit schema version
#   env interpolation   — dollar-brace syntax; .flux/.env auto-loaded
#   tags                — partial sync via `flux sync westlake --tag dotfiles`
#                         multiple tags allowed; `--tag a,b` matches either
#
# Useful invocations:
#   flux sync westlake                              # full sync
#   flux sync westlake --dry-run --diff             # preview only
#   flux sync westlake --only-stage block           # just inject zsh blocks
#   flux sync westlake --tag dotfiles               # only dotfiles
#   flux sync westlake --skip-stage script          # skip the slow installs
#   flux undo westlake                              # restore previous backup

version: 2

# ========== SSH connection ==========
host: "<REMOTE_HOST>"
port: 22
user: <REMOTE_USER>
# Recommended: put WESTLAKE_PASSWORD in .flux/.env (auto-loaded);
# alternative: password: "keychain:flux.westlake-root"
password: "${WESTLAKE_PASSWORD:-<SSH_PASSWORD_OR_REMOVE_AND_USE_KEY>}"
key: ~/.ssh/id_ed25519_<REPLACE_ME>
register_key: true

# ========== Globals ==========
interpreter: /bin/bash
flags: ["-i"]
comment_template: "# {}"

# ========== Files ==========
file:
  # ----- SSH keys -----
  - name: ssh_key
    src: ~/.ssh/id_ed25519_<REPLACE_ME>
    dst: :~/.ssh/id_ed25519_<REPLACE_ME>
    mode: sync
    chmod: "600"
    tags: [ssh, secrets]

  - name: ssh_key_pub
    src: ~/.ssh/id_ed25519_<REPLACE_ME>.pub
    dst: :~/.ssh/id_ed25519_<REPLACE_ME>.pub
    mode: sync
    chmod: "644"
    tags: [ssh]

  # ----- Shell / terminal dotfiles -----
  - name: p10k_config
    src: .p10k.zsh
    dst: :~/.p10k.zsh
    mode: sync
    tags: [dotfiles, terminal]

  - name: tmux_config
    src: .tmux.conf
    dst: :~/.config/tmux/tmux.conf
    mode: sync
    tags: [dotfiles, terminal]

  - name: ghostty_terminfo
    src: xterm-ghostty.terminfo
    dst: :~/.flux-terminal/xterm-ghostty.terminfo
    mode: sync
    tags: [terminal]

  - name: zellij_config
    src: zellij.config.kdl
    dst: :~/.config/zellij/config.kdl
    mode: sync
    tags: [dotfiles, terminal]

  # ----- AI tool configs -----
  - name: opencode_config
    src: opencode.json
    dst: :~/.config/opencode/opencode.json
    mode: sync
    tags: [ai-tools]

  - name: opencode_auth
    src: opencode_auth.json
    dst: :~/.local/share/opencode/auth.json
    mode: sync
    chmod: "600"
    tags: [ai-tools, secrets]

  - name: codex_config
    src: codex_config.toml
    dst: :~/.codex/config.toml
    mode: sync
    tags: [ai-tools]

  # codex_auth 暂时禁用（token 在远端 OAuth 流程刷新更稳）；
  # 想恢复时把下面 4 行取消注释即可。
  # - name: codex_auth
  #   src: codex_auth.json
  #   dst: :~/.codex/auth.json
  #   mode: sync
  #   chmod: "600"
  #   tags: [ai-tools, secrets]

  - name: claude_settings
    src: claude_settings.json
    dst: :~/.claude/settings.json
    mode: sync
    tags: [ai-tools]

  - name: claude_hud
    src: claude-hud.config.json
    dst: :~/.claude/plugins/claude-hud/config.json
    mode: sync
    tags: [ai-tools]

# ========== Scripts ==========
# Sequential execution. Order intentional:
#   1. apt 基础包      6. setup_terminal  10. install_lsp (skips if no rust)
#   2. uv (python)     7. start_clash     11. install_rust
#   3. github ssh      8. install_node    12. setup_language (locale, zsh)
#   4. zsh             9. install_nvim    13. install_ai_tools (zsh)
#   5. fix_permissions
script:
  - path: apt_packages.sh
    tags: [system, base]

  - path: install_uv.sh
    tags: [dev, python]

  - path: config_github.sh
    tags: [system, ssh]

  - path: install_zsh.sh
    tags: [shell]

  - path: fix_permissions.sh
    tags: [system]

  - path: setup_terminal.sh
    tags: [terminal]

  - path: start_clash.sh
    tags: [system, proxy]

  - path: install_node.sh
    tags: [dev, node]

  - path: install_nvim.sh
    tags: [dev, editor]

  - path: install_lsp.sh
    tags: [dev, editor]

  - path: install_rust.sh
    tags: [dev, rust]

  - path: setup_language.sh
    interpreter: /bin/zsh
    tags: [system, locale]

  - path: install_ai_tools.sh
    interpreter: /bin/zsh
    tags: [dev, ai-tools]

# ========== Blocks ==========
# All inject into ~/.zshrc; order = file order in remote zshrc.
block:
  - name: zsh_config
    path: zsh.sh
    file: :~/.zshrc
    mode: sync
    tags: [shell, base]

  - name: westlake_env
    path: westlake_env.sh
    file: :~/.zshrc
    mode: sync
    tags: [shell, env]

  - name: aliases
    path: aliases.sh
    file: :~/.zshrc
    mode: sync
    tags: [shell, dotfiles]

  - name: tools
    path: tools.sh
    file: :~/.zshrc
    mode: sync
    tags: [shell, dev]

  - name: variable
    path: variable.sh
    file: :~/.zshrc
    mode: sync
    tags: [shell, env, secrets]
