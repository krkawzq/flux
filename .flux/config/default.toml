# Flux 默认配置模板
# 复制此文件并修改 host/user/port 即可使用

# ========== 连接配置 ==========
host = ""                           # 必填: 服务器地址
user = "root"                       # SSH 用户名
port = 22                           # SSH 端口
key = "~/.ssh/id_ed25519_wzq"       # SSH 私钥路径
# password = ""                     # 密码 (不推荐)
add_authorized_key = true           # 自动添加公钥到 authorized_keys

# ========== 脚本环境 ==========
interpreter = "/bin/bash"
interpreter_flags = ["-i"]

block_home = ".flux/blocks"
script_home = ".flux/scripts"

# ========== 文件同步 ==========
# 同步 SSH 密钥
[[file]]
src = "~/.ssh/id_ed25519_wzq"
dist = ":~/.ssh/id_ed25519_wzq"
mode = "update"

[[file]]
src = "~/.ssh/id_ed25519_wzq.pub"
dist = ":~/.ssh/id_ed25519_wzq.pub"
mode = "update"

# 同步配置文件
[[file]]
src = "~/.p10k.zsh"
dist = ":~/.p10k.zsh"
mode = "update"

[[file]]
src = "~/.tmux.conf"
dist = ":~/.tmux.conf"
mode = "update"

# ========== 初始化脚本 (首次连接执行) ==========
[[script]]
src = "install_uv.sh"
mode = "init"
flags = ["-i"]

[[script]]
src = "apt_packages.sh"
mode = "init"
flags = ["-i"]

[[script]]
src = "config_github.sh"
mode = "init"
flags = ["-i"]

[[script]]
src = "install_zsh.sh"
mode = "init"
flags = ["-i"]

# ========== 块同步 (.zshrc) ==========
[block]
dist = ":~/.zshrc"
mode = "incremental"

[[block.blocks]]
src = ["zsh.sh"]
mode = "cover"

[[block.blocks]]
src = ["westlake_env.sh"]
mode = "cover"

[[block.blocks]]
src = ["aliases.sh"]
mode = "cover"
