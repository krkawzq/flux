# Westlake 服务器完整配置

# ========== 连接配置 ==========
host = "172.16.78.10"
user = "root"
password = "123456"
key = "~/.ssh/id_ed25519_wzq"
add_authorized_key = true

# ========== 脚本环境 ==========
interpreter = "/bin/bash"
interpreter_flags = ["-i"]

block_home = ".flux/blocks"
script_home = ".flux/scripts"

# ========== 文件同步 ==========
# 相对路径会从 .flux/files/ 目录解析

[[file]]
src = "ssh/id_ed25519_wzq"       # -> .flux/files/ssh/id_ed25519_wzq
dist = ":~/.ssh/id_ed25519_wzq"
mode = "update"

[[file]]
src = "ssh/id_ed25519_wzq.pub"   # -> .flux/files/ssh/id_ed25519_wzq.pub
dist = ":~/.ssh/id_ed25519_wzq.pub"
mode = "update"

[[file]]
src = ".p10k.zsh"                # -> .flux/files/.p10k.zsh
dist = ":~/.p10k.zsh"
mode = "update"

[[file]]
src = ".tmux.conf"               # -> .flux/files/.tmux.conf
dist = ":~/.tmux.conf"
mode = "update"

# [[file]]
# src = "nvim/init.lua"
# dist = ":~/.config/nvim/init.lua"
# mode = "update"

# ========== 初始化脚本 ==========
[[script]]
src = "install_uv.sh"
mode = "init"
flags = ["-i"]

[[script]]
src = "apt_packages.sh"
mode = "init"
flags = ["-i"]

[[script]]
src = "config_github.sh"
mode = "init"
flags = ["-i"]

[[script]]
src = "install_zsh.sh"
mode = "init"
flags = ["-i"]

# [[script]]
# src = "install_codex.sh"
# mode = "init"
# flags = ["-i"]

# ========== 权限修复脚本 (每次同步后运行) ==========
[[script]]
src = "fix_permissions.sh"
mode = "always"

# ========== 块同步 ==========
[block]
dist = ":~/.zshrc"
mode = "incremental"

[[block.blocks]]
src = ["zsh.sh"]
mode = "cover"

[[block.blocks]]
src = ["westlake_env.sh"]
mode = "cover"

[[block.blocks]]
src = ["aliases.sh"]
mode = "cover"
