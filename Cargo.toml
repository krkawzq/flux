[package]
name = "remote"
version = "0.3.0"
edition = "2021"
description = "SSH remote server management tool with sync, proxy, and transfer capabilities"
authors = ["Remote Contributors"]
license = "MIT"

[dependencies]
# Async runtime
tokio = { version = "1", features = ["full"] }

# SSH
russh = "0.46"
russh-keys = "0.46"

# CLI
clap = { version = "4", features = ["derive", "env"] }

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.8"

# Error handling
thiserror = "1"
anyhow = "1"

# Logging & TUI
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
indicatif = "0.17"
console = "0.15"
comfy-table = "7"

# Utils
chrono = { version = "0.4", features = ["serde"] }
sha2 = "0.10"
dirs = "5"
regex = "1"
glob = "0.3"
async-trait = "0.1"
futures = "0.3"

# Cross-platform background process
[target.'cfg(unix)'.dependencies]
daemonize = "0.5"
nix = { version = "0.29", features = ["signal", "process"] }

[target.'cfg(windows)'.dependencies]
winapi = { version = "0.3", features = ["processthreadsapi", "handleapi", "winbase", "synchapi"] }

[features]
default = []
integration = []

[[bin]]
name = "remote"
path = "src/main.rs"
