# A100 测试配置 (简化版 - 仅包含存在的文件)
host = "172.16.78.10"
user = "root"
port = 33347
key = "~/.ssh/id_ed25519_wzq"
add_authorized_key = true

interpreter = "/bin/bash"
interpreter_flags = []

block_home = "~/remote/blocks"
script_home = "~/remote/scripts"

# 仅同步存在的 SSH 密钥
file = [
    { src = "~/.ssh/id_ed25519_wzq", dist = ":~/.ssh/id_ed25519_wzq", mode = "update" },
    { src = "~/.ssh/id_ed25519_wzq.pub", dist = ":~/.ssh/id_ed25519_wzq.pub", mode = "update" },
]

