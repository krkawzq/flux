[graph]
all-features = false

[advisories]
yanked = "deny"
ignore = []

[bans]
multiple-versions = "warn"
wildcards = "deny"

[licenses]
allow = ["MIT", "Apache-2.0", "Apache-2.0 WITH LLVM-exception", "BSD-2-Clause", "BSD-3-Clause", "ISC", "Unicode-DFS-2016", "Unicode-3.0", "OpenSSL", "MPL-2.0", "Zlib", "0BSD"]

[sources]
unknown-registry = "warn"
unknown-git = "warn"
